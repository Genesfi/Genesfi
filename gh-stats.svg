<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <style>
    .heading { animation: slidein 12s ease-out infinite; }
    .underline { animation: bar 12s ease-out infinite; transform-origin: left center; }
    .meta { animation: fade 12s ease-in-out infinite; }
    .corner { animation: cornerSlide 12s ease-out infinite; }
    .stat { animation: fadeUp 12s ease-out infinite; }
    .s0 { animation-delay: 0.3s }
    .s1 { animation-delay: 0.4s }
    .s2 { animation-delay: 0.5s }
    .s3 { animation-delay: 0.6000000000000001s }
    .lang-bar { animation: bar 12s ease-out infinite; transform-origin: left center; }

    @keyframes slidein {
      0% { opacity: 0; transform: translateX(-12px) }
      8% { opacity: 1; transform: translateX(0) }
      90% { opacity: 1; transform: translateX(0) }
      100% { opacity: 0; transform: translateX(0) }
    }
    @keyframes bar {
      0%, 14% { transform: scaleX(0) }
      24%, 88% { transform: scaleX(1) }
      100% { transform: scaleX(1) }
    }
    @keyframes fade {
      0%, 22% { opacity: 0 }
      32%, 90% { opacity: 1 }
      100% { opacity: 0 }
    }
    @keyframes fadeUp {
      0%, 22% { opacity: 0; transform: translateY(8px) }
      36%, 90% { opacity: 1; transform: translateY(0) }
      100% { opacity: 0; transform: translateY(0) }
    }
    @keyframes cornerSlide {
      0%, 8% { opacity: 0; transform: translateX(-8px) }
      18%, 90% { opacity: 0.6; transform: translateX(0) }
      100% { opacity: 0; transform: translateX(0) }
    }
  </style>
  <defs>
    <linearGradient id="sleek-stats-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#0d0d10" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#sleek-stats-bg)" rx="14" ry="14"/>

  <!-- corner decorations (mirrors sleek-header) -->
  <g class="corner" opacity="0.6">
    <rect x="40" y="42" width="22" height="2" fill="#2cdd59"/>
    <rect x="40" y="42" width="2" height="22" fill="#2cdd59"/>
  </g>
  <g transform="translate(800 0) scale(-1 1)">
    <g class="corner" opacity="0.6">
      <rect x="40" y="42" width="22" height="2" fill="#2cdd59"/>
      <rect x="40" y="42" width="2" height="22" fill="#2cdd59"/>
    </g>
  </g>

  <!-- heading + accent underline -->
  <text class="heading" x="48" y="84" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="36" font-weight="700" letter-spacing="-1.2">Activity.</text>
  <rect class="underline" x="48" y="96" width="181" height="2" fill="#2cdd59" rx="1"/>

  <!-- meta line -->
  <text class="meta" x="48" y="120" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2">@GENESFI   ·   240 CONTRIBUTIONS   ·   GRAPHQL</text>

  <!-- stat blocks -->
  <g transform="translate(48 156)">
      <g class="stat s0">
        <text x="0" y="0" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">REPOS</text>
        <text x="0" y="38" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="34" font-weight="700" letter-spacing="-1">14</text>
        <text x="0" y="60" fill="#a5a5b3" font-family='"Inter", system-ui, sans-serif' font-size="11" font-weight="400">10 indexed</text>
      </g>
    </g>
  <g transform="translate(230 156)">
      <g class="stat s1">
        <text x="0" y="0" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">COMMITS</text>
        <text x="0" y="38" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="34" font-weight="700" letter-spacing="-1">232</text>
        <text x="0" y="60" fill="#a5a5b3" font-family='"Inter", system-ui, sans-serif' font-size="11" font-weight="400">this year</text>
      </g>
    </g>
  <g transform="translate(412 156)">
      <g class="stat s2">
        <text x="0" y="0" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">PRS</text>
        <text x="0" y="38" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="34" font-weight="700" letter-spacing="-1">0</text>
        <text x="0" y="60" fill="#a5a5b3" font-family='"Inter", system-ui, sans-serif' font-size="11" font-weight="400">0 this year</text>
      </g>
    </g>
  <g transform="translate(594 156)">
      <g class="stat s3">
        <text x="0" y="0" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">REVIEWS</text>
        <text x="0" y="38" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="34" font-weight="700" letter-spacing="-1">0</text>
        <text x="0" y="60" fill="#a5a5b3" font-family='"Inter", system-ui, sans-serif' font-size="11" font-weight="400">this year</text>
      </g>
    </g>

  <!-- language strip -->
  <rect x="48" y="254" width="704" height="6" rx="3" fill="#a5a5b3" fill-opacity="0.2"/>
  <g class="lang-bar"><rect x="48" y="254" width="211.2" height="6" rx="3" fill="#f1e05a"/>
  <rect x="259.2" y="254" width="131.648" height="6" rx="3" fill="#f7523f"/>
  <rect x="390.84799999999996" y="254" width="128.832" height="6" rx="3" fill="#3178c6"/>
  <rect x="519.68" y="254" width="91.52" height="6" rx="3" fill="#e34c26"/>
  <rect x="611.1999999999999" y="254" width="140.80000000000007" height="6" rx="3" fill="#4F5D95"/></g>
  <g>
        <rect x="48" y="279" width="8" height="8" rx="2" fill="#f1e05a"/>
        <text x="64" y="286" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1.4">JAVASCRIPT  30%</text>
      </g>
  <g>
        <rect x="224" y="279" width="8" height="8" rx="2" fill="#f7523f"/>
        <text x="240" y="286" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1.4">BLADE  19%</text>
      </g>
  <g>
        <rect x="400" y="279" width="8" height="8" rx="2" fill="#3178c6"/>
        <text x="416" y="286" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1.4">TYPESCRIPT  18%</text>
      </g>
  <g>
        <rect x="576" y="279" width="8" height="8" rx="2" fill="#e34c26"/>
        <text x="592" y="286" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1.4">HTML  13%</text>
      </g>
</svg>