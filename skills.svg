<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    text { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    @keyframes chip0 { 0%,0% { opacity: 0; transform: translateY(6px) } 2%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip1 { 0%,3% { opacity: 0; transform: translateY(6px) } 5%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip2 { 0%,5% { opacity: 0; transform: translateY(6px) } 7%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip3 { 0%,8% { opacity: 0; transform: translateY(6px) } 10%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip4 { 0%,10% { opacity: 0; transform: translateY(6px) } 12%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip5 { 0%,13% { opacity: 0; transform: translateY(6px) } 15%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    @keyframes chip6 { 0%,15% { opacity: 0; transform: translateY(6px) } 17%,92% { opacity: 1; transform: translateY(0) } 97%,100% { opacity: 0 } }
    .chip0 { animation: chip0 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip1 { animation: chip1 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip2 { animation: chip2 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip3 { animation: chip3 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip4 { animation: chip4 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip5 { animation: chip5 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
    .chip6 { animation: chip6 12s ease-out infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  <rect width="100%" height="100%" fill="#0d0d10" rx="14" ry="14"/>

  <!-- Accent bar -->
  <rect x="56" y="74" width="56" height="3" rx="1.5" fill="#2cdd59"/>

  <!-- Heading -->
  <text x="56" y="56" fill="#f7f7fb" font-size="30" font-weight="700" letter-spacing="-0.02em">Stack.</text>

  <!-- Sub-line -->
  <text x="56" y="104" fill="#a5a5b3" font-size="13" font-weight="500" letter-spacing="0.02em">7 tools I reach for daily.</text>

  <!-- Pill rows -->
  <g class="chip0">
        <rect x="65" y="134" width="106" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="118" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">TYPESCRIPT</text>
      </g>
  <g class="chip1">
        <rect x="181" y="134" width="75" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="218.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">PYTHON</text>
      </g>
  <g class="chip2">
        <rect x="266" y="134" width="67" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="299.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">REACT</text>
      </g>
  <g class="chip3">
        <rect x="343" y="134" width="122" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="404" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">AFTER EFFECT</text>
      </g>
  <g class="chip4">
        <rect x="475" y="134" width="51" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="500.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">C++</text>
      </g>
  <g class="chip5">
        <rect x="536" y="134" width="83" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="577.5" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">LARAVEL</text>
      </g>
  <g class="chip6">
        <rect x="629" y="134" width="106" height="28" rx="14" fill="#0d0d10" stroke="#a5a5b3" stroke-width="1" stroke-opacity="0.55"/>
        <text x="682" y="148" fill="#f7f7fb" font-family="ui-monospace, monospace" font-size="13" letter-spacing="0.8" text-anchor="middle" dominant-baseline="middle">JAVASCRIPT</text>
      </g>
</svg>